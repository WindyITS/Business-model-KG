[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "business-model-kg"
version = "0.1.0"
description = "Local pipelines and runtime tooling for business-model knowledge graphs."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "neo4j==6.1.0",
    "openai==2.30.0",
    "pydantic==2.12.5",
]

[project.scripts]
kg-pipeline = "runtime.main:main"
kg-evaluate-graph = "graph.evaluate_graph:main"
kg-query = "runtime.query:main_query"
kg-query-cypher = "runtime.query:main_query_cypher"
kg-neo4j-unload = "runtime.neo4j_admin:main"

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = [
    "entity_resolver",
    "evaluate_graph",
    "llm_extractor",
    "main",
    "model_provider",
    "neo4j_loader",
    "ontology_config",
    "ontology_validator",
    "place_hierarchy",
]

[tool.setuptools.packages.find]
where = ["src"]
include = [
    "graph",
    "graph.*",
    "llm",
    "llm.*",
    "llm_extraction",
    "llm_extraction.*",
    "ontology",
    "ontology.*",
    "runtime",
    "runtime.*",
]

[tool.setuptools.package-data]
ontology = ["ontology.json"]
llm_extraction = [
    "_bundled_prompts/README.md",
    "_bundled_prompts/analyst/README.md",
    "_bundled_prompts/analyst/*.txt",
    "_bundled_prompts/canonical/*.txt",
]
