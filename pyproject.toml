[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "business-model-kg"
version = "0.1.0"
description = "Local pipelines and dataset tooling for business-model knowledge graphs."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "neo4j==6.1.0",
    "openai==2.30.0",
    "pydantic==2.12.5",
]

[project.scripts]
kg-pipeline = "runtime.main:main"
kg-evaluate-graph = "graph.evaluate_graph:main"
text2cypher-build = "text2cypher.cli.build_text2cypher_dataset:main"
text2cypher-prepare-mlx = "text2cypher.cli.prepare_text2cypher_mlx_dataset:main"
text2cypher-train-mlx = "text2cypher.cli.train_text2cypher_mlx_lora:main"
text2cypher-evaluate-mlx = "text2cypher.cli.evaluate_text2cypher_mlx_adapter:main"
text2cypher-export-hf = "text2cypher.cli.export_hf_text2cypher_dataset:main"
text2cypher-validate = "text2cypher.cli.validate_text2cypher_dataset:main"

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = [
    "entity_resolver",
    "evaluate_graph",
    "llm_extractor",
    "main",
    "model_provider",
    "neo4j_loader",
    "ontology_config",
    "ontology_validator",
    "place_hierarchy",
    "text2cypher_mlx_lora",
    "validate_text2cypher_dataset",
]

[tool.setuptools.packages.find]
where = ["src"]
include = [
    "graph",
    "graph.*",
    "llm",
    "llm.*",
    "llm_extraction",
    "llm_extraction.*",
    "ontology",
    "ontology.*",
    "runtime",
    "runtime.*",
    "text2cypher",
    "text2cypher.*",
    "text2cypher_dataset_v2",
    "text2cypher_dataset_v2.*",
]

[tool.setuptools.package-data]
ontology = ["ontology.json"]
