name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap local environment
        run: ./scripts/bootstrap_dev.sh

      - name: Run repo checks
        run: bash ./scripts/check_repo.sh
